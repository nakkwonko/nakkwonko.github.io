<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이력서 - 고낙권</title>
    <style>
        /* 기본 이력서 레이아웃 스타일 설정 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            background-color: #f9f9f9;
            color: #333;
        }
        .resume-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .info-text h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
        }
        .info-text p {
            margin: 5px 0;
            color: #666;
        }
        /* 증명사진(ID Photo) 스타일 구역 */
        .profile-photo img {
            width: 120px;
            height: 160px; /* 표준 이력서 사진 비율 (3:4) */
            object-fit: cover;
            border: 1px solid #ccc;
        }
        section {
            margin-bottom: 30px;
        }
        section h2 {
            font-size: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            color: #222;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 5px;
        }
        .project-item {
            margin-bottom: 15px;
        }
        .project-title {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="resume-container">
        <!-- 헤더 섹션: 인적사항 및 ID 사진 -->
        <header>
            <div class="info-text">
                <h1>고낙권 (Nakkwon Ko)</h1>
                <p>이메일: nakkwonko@naver.com</p>
                <p>깃허브: <a href="https://github.com/nakkwonko/nakkwonko.github.io" target="_blank">github.com/nakkwonko/nakkwonko.github.io</a></p>
                <p>전화번호: 010-9042-3559</p>
            </div>
            <!-- ID Photo 이미지 불러오는 태그 -->
            <div class="profile-photo">
                <img src="profile.jpg" alt="고낙권 증명사진">
            </div>
        </header>

        <main id="resume-main"></main>
    </div>


    <script src="index.js"></script>
</body>
</html>
